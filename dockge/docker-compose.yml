services:
  dockge:
    image: louislam/dockge:1
    container_name: dockge
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      # Directory where all docker-compose stacks are stored.
      # You can change the host path (left side) to point to your Homelab folder or another stacks directory.
      - /opt/stacks:/opt/stacks
    environment:
      - DOCKGE_STACKS_DIR=/opt/stacks
    networks:
      - homelab-net

networks:
  homelab-net:
    name: homelab-net
